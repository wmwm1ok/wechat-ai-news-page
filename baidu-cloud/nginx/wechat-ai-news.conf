server {
    listen 80;
    server_name _;

    root /opt/wechat-ai-news/current;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /output/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /latest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
