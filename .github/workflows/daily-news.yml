name: AI Daily News

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: ai-daily-news
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch and generate news
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_URL: ${{ secrets.DEEPSEEK_API_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: npm start

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: news-output
          path: |
            output/
            latest.json
          retention-days: 30

      - name: Commit generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add -f latest.json latest-*.json output/*.json

          if ! git diff --cached --quiet; then
            EDITION=$(node --input-type=module -e "import latest from './latest.json' with { type: 'json' }; console.log(latest.edition || 'daily');")
            DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
            git commit -m "Update AI ${EDITION} news: ${DATE}"
            git push
          else
            echo "No generated file changes"
          fi
